<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mitsubishi AC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --glow: 59, 130, 246;
      --bg: #0f1117;
      --card: #1a1d27;
      --border: #2a2d3a;
      --text: #e2e8f0;
      --muted: #64748b;
    }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg);
      background-image: radial-gradient(ellipse 120% 120% at 50% 50%, rgba(var(--glow), 0.07), transparent 70%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      padding: 1.5rem;
      transition: background-image 0.8s ease;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 90% 60% at 50% -10%, rgba(var(--glow), 0.22), transparent 70%);
      transition: background 0.8s ease;
      pointer-events: none;
      z-index: 0;
    }

    body.temp-20 { --glow: 59, 130, 246; }
    body.temp-21 { --glow: 34, 170, 200; }
    body.temp-22 { --glow: 16, 185, 129; }
    body.temp-23 { --glow: 245, 120, 30; }
    body.temp-24 { --glow: 239, 68, 68; }

    .card {
      position: relative;
      z-index: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 2rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .icon {
      font-size: 2.5rem;
      display: block;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .subtitle {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.25rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgb(var(--glow));
      animation: pulse 2s infinite;
      margin-right: 0.4rem;
      vertical-align: middle;
      transition: background 0.8s ease;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 0 1.5rem;
    }

    .label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .temp-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 0.875rem;
      font-weight: 600;
      transition: all 0.2s ease;
      cursor: pointer;
      border: 1px solid transparent;
      background: none;
      font-family: inherit;
    }

    /* each button carries its own color */
    .btn-temp[data-temp="20"] { --btn-glow: 59, 130, 246; }
    .btn-temp[data-temp="21"] { --btn-glow: 34, 170, 200; }
    .btn-temp[data-temp="22"] { --btn-glow: 16, 185, 129; }
    .btn-temp[data-temp="23"] { --btn-glow: 245, 120, 30; }
    .btn-temp[data-temp="24"] { --btn-glow: 239, 68, 68; }

    .btn-temp {
      flex-direction: column;
      padding: 0.75rem 0.25rem;
      background: rgba(var(--btn-glow), 0.08);
      border-color: rgba(var(--btn-glow), 0.2);
      color: rgb(var(--btn-glow));
      font-size: 1rem;
      gap: 0.15rem;
    }

    .btn-temp .deg {
      font-size: 0.6rem;
      font-weight: 400;
      color: var(--muted);
    }

    .btn-temp:hover {
      background: rgba(var(--btn-glow), 0.22);
      border-color: rgb(var(--btn-glow));
      box-shadow: 0 0 20px rgba(var(--btn-glow), 0.3);
      transform: translateY(-2px);
    }

    .btn-temp.active {
      background: rgba(var(--btn-glow), 0.28);
      border-color: rgb(var(--btn-glow));
      box-shadow: 0 0 24px rgba(var(--btn-glow), 0.4);
    }

    .btn-temp:active, .btn-off:active { transform: translateY(0) scale(0.97); }

    .btn-off {
      width: 100%;
      padding: 1rem;
      font-size: 1rem;
      letter-spacing: 0.05em;
      gap: 0.5rem;
      margin-top: 0.5rem;
      background: rgba(239,68,68,0.08);
      border-color: rgba(239,68,68,0.3);
      color: #ef4444;
    }

    .btn-off:hover {
      background: rgba(239,68,68,0.18);
      border-color: #ef4444;
      box-shadow: 0 0 20px rgba(239,68,68,0.25);
      transform: translateY(-1px);
    }


    .current-temp {
      text-align: center;
      font-size: 3rem;
      font-weight: 700;
      color: rgb(var(--glow));
      transition: color 0.8s ease;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 0.25rem;
    }

    .current-label {
      text-align: center;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <span class="icon">❄️</span>
      <h1>Mitsubishi AC</h1>
      <p class="subtitle"><span class="status-dot"></span>Climate Control</p>
    </div>

    <div class="divider"></div>

    <div class="current-temp" id="display">—</div>
    <p class="current-label" id="display-label">select temperature</p>

    <p class="label">Temperature</p>
    <div class="temp-grid">
      <button class="btn btn-temp" data-temp="20" onclick="setTemp(20)">20<span class="deg">°C</span></button>
      <button class="btn btn-temp" data-temp="21" onclick="setTemp(21)">21<span class="deg">°C</span></button>
      <button class="btn btn-temp" data-temp="22" onclick="setTemp(22)">22<span class="deg">°C</span></button>
      <button class="btn btn-temp" data-temp="23" onclick="setTemp(23)">23<span class="deg">°C</span></button>
      <button class="btn btn-temp" data-temp="24" onclick="setTemp(24)">24<span class="deg">°C</span></button>
    </div>

    <button class="btn btn-off" onclick="turnOff()">⏻ Turn Off</button>
  </div>

  <script>
    const display = document.getElementById('display');
    const displayLabel = document.getElementById('display-label');

    function setTemp(t) {
      document.querySelectorAll('.btn-temp').forEach(b => b.classList.remove('active'));
      document.querySelector('[data-temp="' + t + '"]').classList.add('active');
      document.body.className = 'temp-' + t;
      display.textContent = t + '°';
      displayLabel.textContent = 'cooling active';
      fetch('/on/' + t).catch(() => {});
    }

    function turnOff() {
      document.querySelectorAll('.btn-temp').forEach(b => b.classList.remove('active'));
      document.body.className = '';
      display.textContent = '—';
      displayLabel.textContent = 'select temperature';
      fetch('/off').catch(() => {});
    }
  </script>
</body>
</html>
